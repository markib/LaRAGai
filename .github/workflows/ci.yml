name: CI / DevSecOps

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.2]   # Laravel 10/11 → 8.2 recommended
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ FIXED VERSION (v2)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4   # ✅ v5 not stable everywhere
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      # ✅ REQUIRED for Laravel
      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      # ✅ Use SQLite for CI (fast + no setup)
      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHP unit tests
        run: php artisan test --colors=always

      - name: Composer dependency audit
        run: composer audit

      - name: NPM dependency audit
        run: npm audit --audit-level=moderate

      - name: Build frontend
        run: npm run build

      # ✅ Updated Trivy version
      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
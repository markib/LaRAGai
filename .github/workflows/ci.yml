name: CI / DevSecOps

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.4]
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Copy .env
        run: cp .env.example .env

      - name: Create Laravel required directories
        run: |
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p bootstrap/cache

      - name: Generate app key
        run: php artisan key:generate

      # 1. Syntax check
      - name: PHP Syntax Check
        run: find . -path ./vendor -prune -o -type f -name "*.php" -print | xargs -P 4 -n 1 php -l  

      # 2. Code style formatting
      - name: Check Code Style
        run: ./vendor/bin/pint --test

      # 3. 🚀 PREPARE DATABASE FIRST (Moved up)
      - name: Prepare SQLite database
        run: |
          mkdir -p database
          rm -f database/database.sqlite
          touch database/database.sqlite

      # Add this step right here 👇
      - name: Start Qdrant Vector Database
        run: |
          docker run -d -p 6333:6333 -p 6334:6334 qdrant/qdrant    

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      # 4. GENERATE HELPERS & ANALYZE (With DB environment injected)
      - name: Generate IDE Helpers for PHPStan
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          php artisan ide-helper:generate
          php artisan ide-helper:models --nowrite --filename=_ide_helper_models.php --dir="app/Models" --write-mixin -N
          php artisan ide-helper:meta  

      - name: Static analysis (Larastan)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: ./vendor/bin/phpstan analyse

      # 5. TEST & AUDIT
      - name: Run PHP unit tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test --colors=always

      - name: Composer dependency audit
        run: composer audit

      - name: NPM dependency audit
        run: npm audit --audit-level=moderate

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@v0.14.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
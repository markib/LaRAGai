<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Favicon Circle -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161233" />
      <stop offset="100%" stop-color="#090714" />
    </radialGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Core Line Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="centerA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
  </defs>

  <!-- Base Circular Dark Background for Favicon Context -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="#1e1b4b" stroke-width="4" />

  <!-- Background Data Streams / Particles -->
  <g opacity="0.3">
    <circle cx="160" cy="290" r="2" fill="#22d3ee" />
    <circle cx="352" cy="290" r="2" fill="#ec4899" />
    <circle cx="210" cy="310" r="1.5" fill="#22d3ee" />
    <circle cx="302" cy="310" r="1.5" fill="#ec4899" />
    <line x1="210" y1="280" x2="210" y2="300" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" />
    <line x1="302" y1="280" x2="302" y2="300" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- MAIN EMBEDDINGS & DATA ELEMENTS (Bottom) -->
  <g id="data-elements">
    <!-- Left Floating Document Chunks -->
    <g transform="translate(130, 240)" filter="url(#glowCyan)">
      <rect x="0" y="0" width="24" height="32" rx="4" fill="#0f172a" stroke="url(#cyanGrad)" stroke-width="2" />
      <line x1="5" y1="8" x2="19" y2="8" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
      <line x1="5" y1="14" x2="19" y2="14" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
      <line x1="5" y1="20" x2="13" y2="20" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
    </g>
    
    <g transform="translate(165, 290)" filter="url(#glowCyan)">
      <rect x="0" y="0" width="24" height="32" rx="4" fill="#0f172a" stroke="url(#cyanGrad)" stroke-width="2" />
      <line x1="5" y1="8" x2="19" y2="8" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
      <line x1="5" y1="14" x2="15" y2="14" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
      <line x1="5" y1="20" x2="19" y2="20" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Right Floating Document Chunks -->
    <g transform="translate(358, 280)" filter="url(#glowPurple)">
      <rect x="0" y="0" width="24" height="32" rx="4" fill="#0f172a" stroke="url(#purpleGrad)" stroke-width="2" />
      <line x1="5" y1="8" x2="19" y2="8" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" />
      <line x1="5" y1="14" x2="19" y2="14" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Vector Embeddings (3D Isometric Spatial Cubes at Bottom Center) -->
    <!-- Center Left Cube -->
    <g transform="translate(225, 330)">
      <path d="M 0,-12 L 14,-20 L 28,-12 L 14,-4 Z" fill="#38bdf8" opacity="0.8" />
      <path d="M 0,-12 L 14,-4 L 14,12 L 0,4 Z" fill="#0284c7" />
      <path d="M 14,-4 L 28,-12 L 28,4 L 14,12 Z" fill="#0369a1" />
    </g>
    
    <!-- Center Right Cube -->
    <g transform="translate(275, 310)">
      <path d="M 0,-12 L 14,-20 L 28,-12 L 14,-4 Z" fill="#c084fc" opacity="0.8" />
      <path d="M 0,-12 L 14,-4 L 14,12 L 0,4 Z" fill="#9333ea" />
      <path d="M 14,-4 L 28,-12 L 28,4 L 14,12 Z" fill="#7e22ce" />
    </g>
  </g>

  <!-- BRAIN CORE & AI ENGINE (Top & Center) -->
  <g id="brain-neural-network" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Hemisphere (Cyan / Retrieval & Data Pipelines) -->
    <g stroke="url(#cyanGrad)" stroke-width="5" fill="none" filter="url(#glowCyan)">
      <!-- Outer Cortical Loop -->
      <path d="M 235,115 C 190,110 145,140 145,185 C 145,210 160,225 155,245 C 150,265 170,290 195,290 C 215,290 225,275 235,275" />
      <!-- Inner Synaptic Tracks -->
      <path d="M 175,155 C 175,180 200,180 200,205" />
      <path d="M 150,210 C 180,210 185,245 215,245" />
      <path d="M 205,135 C 185,155 220,170 225,200" />
    </g>

    <!-- Right Hemisphere (Purple / Synthesis & Generative LLM) -->
    <g stroke="url(#purpleGrad)" stroke-width="5" fill="none" filter="url(#glowPurple)">
      <!-- Outer Cortical Loop -->
      <path d="M 277,115 C 322,110 367,140 367,185 C 367,210 352,225 357,245 C 362,265 342,290 317,290 C 297,290 287,275 277,275" />
      <!-- Inner Synaptic Tracks -->
      <path d="M 337,155 C 337,180 312,180 312,205" />
      <path d="M 362,210 C 332,210 327,245 297,245" />
      <path d="M 307,135 C 327,155 292,170 287,200" />
    </g>
  </g>

  <!-- CENTRAL "A" PORTAL (The Anchor Symbol) -->
  <g id="apex-architecture" transform="translate(211, 160)">
    <!-- Deep Vector Shadow Background for Depth -->
    <polygon points="45,0 90,85 62,85 45,50 28,50 11,85 0,85" fill="#0b0f19" />
    
    <!-- Bold Metallic Geometric Gradient Frame -->
    <polygon points="45,0 90,85 65,85 52,58 38,58 25,85 0,85" fill="url(#centerA)" />
    
    <!-- Futuristic Cross-Inlay Cutting Matrix -->
    <polygon points="45,18 59,46 31,46" fill="#161233" />
    <rect x="33" y="46" width="24" height="4" fill="url(#cyanGrad)" />
  </g>
</svg>
